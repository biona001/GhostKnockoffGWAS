name: Build binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional existing release tag to attach artifacts to, e.g. v0.3.0"
        required: false
        type: string
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            julia-arch: x64
            target: linux-x86_64
            heap-size-hint: 8G
          - os: ubuntu-24.04-arm
            julia-arch: aarch64
            target: linux-aarch64
            heap-size-hint: 8G
          - os: macos-15-intel
            julia-arch: x64
            target: macos-x86_64
            heap-size-hint: 10G
          - os: macos-15
            julia-arch: aarch64
            target: macos-aarch64
            heap-size-hint: 5G

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v3
        with:
          version: "1.12"
          arch: ${{ matrix.julia-arch }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/compiled
          key: ${{ runner.os }}-${{ matrix.julia-arch }}-packagecompiler-${{ hashFiles('Project.toml', 'Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.julia-arch }}-packagecompiler-
            ${{ runner.os }}-${{ matrix.julia-arch }}-

      - name: Prepare build environment
        env:
          JULIA_NUM_PRECOMPILE_TASKS: "1"
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --heap-size-hint=${{ matrix.heap-size-hint }} --project=/tmp/citlasso-build-env -e '
            using Pkg
            Pkg.activate("/tmp/citlasso-build-env")
            Pkg.add("PackageCompiler")
            Pkg.develop(url="https://github.com/biona001/ghostbasil_jll.jl")
            Pkg.develop(url="https://github.com/biona001/Ghostbasil.jl")
            Pkg.develop(PackageSpec(path=pwd()))
            if Sys.ARCH === :aarch64
                Pkg.develop(PackageSpec(name="HostCPUFeatures"))
                hcf_files = String[]
                for depot in DEPOT_PATH
                    dev_hcf_file = joinpath(depot, "dev", "HostCPUFeatures", "src", "cpu_info_aarch64.jl")
                    if isfile(dev_hcf_file)
                        push!(hcf_files, dev_hcf_file)
                    end
                    pkg_hcf_root = joinpath(depot, "packages", "HostCPUFeatures")
                    if isdir(pkg_hcf_root)
                        for entry in readdir(pkg_hcf_root)
                            pkg_hcf_file = joinpath(pkg_hcf_root, entry, "src", "cpu_info_aarch64.jl")
                            if isfile(pkg_hcf_file)
                                push!(hcf_files, pkg_hcf_file)
                            end
                        end
                    end
                end
                if isempty(hcf_files)
                    @warn "HostCPUFeatures aarch64 vscale patch found no cpu_info_aarch64.jl files"
                end
                for hcf_file in unique(hcf_files)
                    hcf_code = read(hcf_file, String)
                    patched_hcf_code = replace(
                        hcf_code,
                        "@noinline vscale() = ccall(\"llvm.vscale.i64\", llvmcall, Int64, ())" =>
                            "@noinline vscale() = Int64(1)",
                        "@noinline vscale() = ccall(\"llvm.vscale.i32\", llvmcall, Int32, ())" =>
                            "@noinline vscale() = Int32(1)",
                    )
                    if patched_hcf_code == hcf_code
                        @warn "HostCPUFeatures aarch64 vscale patch did not change $(hcf_file)"
                    else
                        write(hcf_file, patched_hcf_code)
                    end
                end
            end
            Pkg.instantiate()
            Pkg.precompile()
          '

      - name: Build app
        env:
          CITLASSO_HEAP_SIZE_HINT: ${{ matrix.heap-size-hint }}
          JULIA_NUM_PRECOMPILE_TASKS: "1"
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          mkdir -p build
          df -h
          julia --heap-size-hint=${{ matrix.heap-size-hint }} --project=/tmp/citlasso-build-env -e '
            using PackageCompiler, CITLasso
            println("Julia version: ", VERSION)
            println("PackageCompiler version: ", pkgversion(PackageCompiler))
            println("CITLasso path: ", pathof(CITLasso))
            println("Memory total/free bytes: ", Sys.total_memory(), " / ", Sys.free_memory())
            src = normpath(pathof(CITLasso), "../..")
            app_dir = joinpath(pwd(), "build", "cit-lasso-${{ matrix.target }}")
            precompile_script = normpath(pathof(CITLasso), "../precompile.jl")
            heap_size_hint = get(ENV, "CITLASSO_HEAP_SIZE_HINT", "")
            sysimage_build_args = isempty(heap_size_hint) ? `` : Cmd(["--heap-size-hint=$heap_size_hint"])
            create_app(src, app_dir;
                include_lazy_artifacts=true,
                force=true,
                precompile_execution_file=precompile_script,
                sysimage_build_args=sysimage_build_args,
                executables=[
                    "cit-lasso" => "julia_main",
                    "solveblock" => "julia_solveblock",
                ],
            )
          '
          df -h

      - name: Smoke test
        run: |
          ./build/cit-lasso-${{ matrix.target }}/bin/cit-lasso --help
          ./build/cit-lasso-${{ matrix.target }}/bin/solveblock --help

      - name: Archive app
        run: tar -czf CIT-Lasso-${{ matrix.target }}.tar.gz -C build cit-lasso-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: CIT-Lasso-${{ matrix.target }}
          path: CIT-Lasso-${{ matrix.target }}.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: CIT-Lasso-${{ matrix.target }}.tar.gz
